<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>{{{ PRODUCT_NAME }}}</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center;
         font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         color: #fff; }
  #canvas { display: block; width: 100vw; height: 100vh; outline: none;
            touch-action: none; -webkit-tap-highlight-color: transparent; }
  #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; }
  #bar { width: 60vw; max-width: 320px; height: 4px; margin-top: 12px; background: #222;
         border-radius: 2px; overflow: hidden; }
  #bar > div { width: 0; height: 100%; background: #fff; transition: width .15s linear; }
</style>
</head>
<body>
  <canvas id="canvas" tabindex="-1"></canvas>
  <div id="loader"><div>Loading…</div><div id="bar"><div></div></div></div>

  <script>
    var loaderUrl  = "Build/{{{ LOADER_FILENAME }}}";
    var config = {
      dataUrl:       "Build/{{{ DATA_FILENAME }}}",
      frameworkUrl:  "Build/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl:       "Build/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      showBanner: function () {}
    };

    var canvas = document.getElementById("canvas");
    var loader = document.getElementById("loader");
    var barFill = document.querySelector("#bar > div");

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function () {
      createUnityInstance(canvas, config, function (p) {
        barFill.style.width = (100 * p) + "%";
      }).then(function (instance) {
        window.unityInstance = instance;
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }).catch(function (err) { console.error(err); });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
